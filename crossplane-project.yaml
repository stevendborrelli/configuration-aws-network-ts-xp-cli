apiVersion: dev.crossplane.io/v1alpha1
kind: Project
metadata:
  name: configuration-aws-network-ts
spec:
  architectures: [amd64, arm64]
  crossplane:
    version: '>=v2.3.0'
  dependencies:
  - type: xpkg
    xpkg:
      apiVersion: pkg.crossplane.io/v1
      kind: Provider
      package: xpkg.upbound.io/upbound/provider-aws-ec2
      version: v2.6.0
  - type: xpkg
    xpkg:
      apiVersion: pkg.crossplane.io/v1
      kind: Function
      package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: '>=v0.7.0'
  description: This configuration provides a foundation to build and operate AWS networks.
  functions:
  - directory:
      name: network
    source: Directory
  license: Apache-2.0
  repository: index.docker.io/steve/configuration-aws-network-ts
  schemas:
    languages:
    - typescript
  source: github.com/stevendborrelli/configuration-aws-network-ts
